apiVersion: apps/v1
kind: Deployment
metadata:
  name: spfa-deployment
  labels:
    app: spfa
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: spfa
  template:
    metadata:
      labels:
        app: spfa
    spec:
      containers:
        - name: spfa
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
{{- if and .Values.config.enabled .Values.config.data }}
            - name: MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: spfa-config
                  key: MESSAGE
{{- end }}
{{- if and .Values.secret.enabled .Values.secret.data }}
            - name: SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: spfa-secret
                  key: SECRET_TOKEN
{{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
